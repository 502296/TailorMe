<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book TailorMe</title>
  <link rel="stylesheet" href="appointment.css" />
</head>

<body>
  <main class="tm-main">
    <section class="tm-card">
      <div class="tm-brand">👑 TailorMe</div>

      <h1>Book a Visit</h1>
      <p class="subtitle">
        Tell us what you need. We’ll contact you to confirm the details.
      </p>

      <form id="bookingForm">
        <label>
          Full Name
          <input type="text" id="name" required />
        </label>

        <label>
          Phone Number
          <input type="tel" id="phone" required />
        </label>

        <label>
          Email
          <input type="email" id="email" />
        </label>

        <label>
          Address
          <input type="text" id="address" required />
        </label>

        <label>
          What do you need?
          <textarea id="message" rows="5" required placeholder="Example: I have a jacket that needs sleeve shortening..."></textarea>
        </label>

        <button type="submit">Send Request</button>

        <p id="status"></p>
      </form>

      <a class="back" href="index.html">← Back to Home</a>
    </section>
  </main>

  <script>
    const PERSONAL_EMAIL = "ali.kathem.edu@gmail.com";

    document.getElementById("bookingForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const name = document.getElementById("name").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const email = document.getElementById("email").value.trim();
      const address = document.getElementById("address").value.trim();
      const message = document.getElementById("message").value.trim();

      if (!name || !phone || !address || !message) {
        document.getElementById("status").textContent = "Please fill all required fields.";
        return;
      }

      const subject = encodeURIComponent("New TailorMe Request");
      const body = encodeURIComponent(
`New TailorMe Request

Name: ${name}
Phone: ${phone}
Email: ${email || "Not provided"}
Address: ${address}

Customer Message:
${message}
`
      );

      window.location.href = `mailto:${PERSONAL_EMAIL}?subject=${subject}&body=${body}`;
    });
  </script>
</body>
</html>
